name: fortune-bot

on:
  schedule:
    - cron: '0 22 * * *'  # 日本時間 7:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4

      - name: 実行
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}  # ←ここ重要
        run: |
          echo "===== 実行開始 ====="
          python main.py
          echo "===== 実行終了 ====="
